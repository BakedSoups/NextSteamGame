services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: steam_rec
      POSTGRES_USER: steam_rec
      POSTGRES_PASSWORD: steam_rec
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U steam_rec -d steam_rec"]
      interval: 5s
      timeout: 5s
      retries: 20

  postgres_loader:
    profiles: ["loader"]
    build:
      context: .
      dockerfile: Dockerfile.api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      STEAM_REC_POSTGRES_DSN: postgresql://steam_rec:steam_rec@postgres:5432/steam_rec
      DB_CREATION_DATA_DIR: /app/data
    volumes:
      - ./data:/app/data:ro
    command: ["python", "-m", "db_creation.postgres.load_from_sqlite"]
    restart: "no"

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      STEAM_REC_POSTGRES_DSN: postgresql://steam_rec:steam_rec@postgres:5432/steam_rec
      DB_CREATION_DATA_DIR: /app/data
    volumes:
      - ./data:/app/data
      - chroma_model_cache:/root/.cache/chroma
    ports:
      - "127.0.0.1:8000:8000"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000}
    depends_on:
      api:
        condition: service_started
    ports:
      - "127.0.0.1:3000:3000"
    restart: unless-stopped

volumes:
  postgres_data:
  chroma_model_cache:
