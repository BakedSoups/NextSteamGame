{% if results %}
<ul class="search-results">
  {% for game in results %}
  <li>
    <button
      class="search-hit"
      hx-get="/game/{{ game.appid }}"
      hx-target="#selected-game"
      hx-swap="innerHTML"
      hx-on:click="htmx.ajax('GET', '/recommend?appid={{ game.appid }}', {target:'#recommendations'})">
      <span class="game-name">{{ game.name }}</span>
      <span class="appid">#{{ game.appid }}</span>
    </button>
  </li>
  {% endfor %}
</ul>
{% else %}
<p class="muted">No games match this search yet.</p>
{% endif %}
